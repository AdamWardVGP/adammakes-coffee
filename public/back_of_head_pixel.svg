<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 26" shape-rendering="crispEdges" preserveAspectRatio="none">

  <!-- ── HAIR (dark navy) ── -->
  <!-- top arc -->
  <rect x="13" y="2" width="14" height="1" fill="#2a2845"/>
  <rect x="11" y="3" width="18" height="1" fill="#2a2845"/>
  <rect x="9"  y="4" width="22" height="1" fill="#2a2845"/>
  <rect x="8"  y="5" width="24" height="1" fill="#2a2845"/>
  <!-- main hair body rows 6-13 -->
  <rect x="7"  y="6" width="26" height="8" fill="#2a2845"/>
  <!-- hair highlight (subtle lighter centre) -->
  <rect x="16" y="3" width="8"  height="1" fill="#3a3760"/>
  <rect x="15" y="4" width="10" height="1" fill="#3a3760"/>
  <rect x="14" y="5" width="12" height="1" fill="#3a3760"/>
  <rect x="14" y="6" width="12" height="3" fill="#3a3760"/>
  <!-- hair nape left side -->
  <rect x="7"  y="14" width="7" height="1" fill="#2a2845"/>
  <rect x="8"  y="15" width="5" height="1" fill="#2a2845"/>
  <rect x="9"  y="16" width="4" height="1" fill="#2a2845"/>
  <rect x="10" y="17" width="3" height="1" fill="#2a2845"/>
  <rect x="11" y="18" width="2" height="1" fill="#2a2845"/>
  <!-- hair nape right side -->
  <rect x="26" y="14" width="7" height="1" fill="#2a2845"/>
  <rect x="27" y="15" width="5" height="1" fill="#2a2845"/>
  <rect x="27" y="16" width="4" height="1" fill="#2a2845"/>
  <rect x="27" y="17" width="3" height="1" fill="#2a2845"/>
  <rect x="27" y="18" width="2" height="1" fill="#2a2845"/>

  <!-- ── SKIN (nape, centre of lower head) ── -->
  <rect x="14" y="14" width="12" height="1" fill="#dda077"/>
  <rect x="13" y="15" width="14" height="4" fill="#dda077"/>

  <!-- ── EARS ── (visible between hair and headphone cup) -->
  <rect x="5"  y="11" width="3" height="2" fill="#c8906a"/>
  <rect x="32" y="11" width="3" height="2" fill="#c8906a"/>

  <!-- ── NECK ── -->
  <rect x="15" y="19" width="10" height="2" fill="#dda077"/>

  <!-- ── SHIRT / SHOULDERS ── -->
  <rect x="13" y="21" width="14" height="1" fill="#1c1a32"/>
  <rect x="8"  y="22" width="24" height="1" fill="#1c1a32"/>
  <rect x="3"  y="23" width="34" height="1" fill="#1c1a32"/>
  <rect x="0"  y="24" width="40" height="1" fill="#1c1a32"/>
  <rect x="0"  y="25" width="40" height="1" fill="#1c1a32"/>

  <!-- ── HEADPHONES (accent-cyan) ── -->
  <!-- headband across top (2px thick) -->
  <rect x="11" y="1" width="18" height="2" fill="#7fdbca"/>
  <!-- left band arm -->
  <rect x="9"  y="3" width="2"  height="2" fill="#7fdbca"/>
  <rect x="8"  y="5" width="2"  height="2" fill="#7fdbca"/>
  <rect x="7"  y="7" width="2"  height="2" fill="#7fdbca"/>
  <rect x="5"  y="9" width="2"  height="1" fill="#7fdbca"/>
  <!-- right band arm -->
  <rect x="29" y="3" width="2"  height="2" fill="#7fdbca"/>
  <rect x="30" y="5" width="2"  height="2" fill="#7fdbca"/>
  <rect x="31" y="7" width="2"  height="2" fill="#7fdbca"/>
  <rect x="33" y="9" width="2"  height="1" fill="#7fdbca"/>
  <!-- left ear cup -->
  <rect x="3"  y="10" width="5" height="5" fill="#7fdbca"/>
  <!-- right ear cup -->
  <rect x="32" y="10" width="5" height="5" fill="#7fdbca"/>
  <!-- cup inset (darker, shows depth) -->
  <rect x="4"  y="11" width="3" height="3" fill="#4aab96"/>
  <rect x="33" y="11" width="3" height="3" fill="#4aab96"/>

</svg>
